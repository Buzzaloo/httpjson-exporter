# OpenTelemetry Collector Configuration
# Windows Event Logs to Exaforce via HTTP JSON Exporter

receivers:
  windowseventlog/system:
    channel: System
  
  windowseventlog/application:
    channel: Application
  
  windowseventlog/security:
    channel: Security

processors:
  # Memory limiter to prevent OOM
  memory_limiter:
    check_interval: 2s
    limit_mib: 200
    spike_limit_mib: 20
  
  # Batch logs before sending
  batch:
    send_batch_size: 100
    timeout: 10s
  
  # Add resource attributes
  resourcedetection:
    detectors: [system]
    override: false

exporters:
  # HTTP JSON Exporter for Exaforce
  httpjson:
    endpoint: "https://your-tenant.us.app.exaforce.io/api/ingest/logs"
    bearer_token: "${EXAFORCE_API_TOKEN}"
    compression: gzip
    timeout: 30s
    batch_size: 100
    headers:
      X-Custom-Header: "windows-logs"
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 1000
  
  # Debug exporter for troubleshooting (optional)
  debug:
    verbosity: detailed

service:
  pipelines:
    logs:
      receivers: [windowseventlog/system, windowseventlog/application, windowseventlog/security]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [httpjson]
  
  telemetry:
    logs:
      level: info
      encoding: console
      output_paths:
        - "C:\\ProgramData\\OpenTelemetry Collector\\otelcol.log"
        - stderr
